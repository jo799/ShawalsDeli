version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: shawalsdeli_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shawalsdeli
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: shawalsdeli_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shawalsdeli_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shawalsdeli
      DB_USER: postgres
      DB_PASSWORD: shawalsdeli_pass
      JWT_SECRET: change_this_to_a_very_long_random_secret_in_production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:5173
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shawalsdeli_web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  postgres_data:
    name: shawalsdeli_postgres_data
